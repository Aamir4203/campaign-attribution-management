# Auto-generated from shared/config/app.yaml (alerts section)
# All email settings centralized - no hardcoded addresses in scripts
#
# ALERT_TO: Recipient email addresses (comma-separated)
# ALERT_SENDER: Sender address with display name
#
# Usage in shell scripts:
#   # Using mail command with sender
#   echo "Alert message" | mail -r "$ALERT_SENDER" -s "Subject" $ALERT_TO
#
#   # Using sendmail with sender
#   (
#   echo "From: $ALERT_SENDER"
#   echo "To: $ALERT_TO"
#   echo "Subject: Your Subject"
#   echo ""
#   echo "Message body"
#   ) | sendmail -t
#
# Python scripts access via config_loader.py:
#   config = ConfigLoader()
#   recipients = config.alert_recipients  # Returns ALERT_TO value
#   sender = config.alert_sender          # Returns ALERT_SENDER value
#
