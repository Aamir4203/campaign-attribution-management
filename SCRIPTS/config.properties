# ===== REQUEST-SPECIFIC LOOKUPS =====
# Only run when a request_id ($1) is provided
# (skipped when sourced by requestPicker.sh which has no argument)
if [ -n "$1" ]; then
    CLIENT_NAME=`psql -U datateam -h zds-prod-pgdb01-01.bo3.e-dialog.com -d apt_tool_db -qtAX -c "select upper(client_name) from APT_CUSTOM_CLIENT_INFO_TABLE_DND a join $REQUEST_TABLE b on a.client_id=b.client_id where request_id=$1"`

    USER=`psql -U datateam -h zds-prod-pgdb01-01.bo3.e-dialog.com -d apt_tool_db -qtAX -c "select upper(added_by) from APT_CUSTOM_CLIENT_INFO_TABLE_DND a join $REQUEST_TABLE b on a.client_id=b.client_id where request_id=$1"`

    WEEK=`psql -U datateam -h zds-prod-pgdb01-01.bo3.e-dialog.com -d apt_tool_db -qtAX -c "select upper(week) from $REQUEST_TABLE where request_id=$1"`

    FROM_DATE=`psql -U datateam -h zds-prod-pgdb01-01.bo3.e-dialog.com -d apt_tool_db -qtAX -c "select from_date from $REQUEST_TABLE where request_id=$1"`

    POSTED_UNSUB_HARDS_TABLE=`psql -U datateam -h zds-prod-pgdb01-01.bo3.e-dialog.com -d apt_tool_db -qtAX -c "select upper(posted_unsub_hards_table) from APT_CUSTOM_CLIENT_INFO_TABLE_DND where client_name='$CLIENT_NAME'"`

    REQUEST_TYPE=`psql -U datateam -h zds-prod-pgdb01-01.bo3.e-dialog.com -d apt_tool_db -qtAX -c "select type from $REQUEST_TABLE where request_id=$1"`

    TRT_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_$WEEK\_TRT_TABLE
    SUPP_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_SUPPRESSION_TABLE
    REPORT_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_REPORT_TABLE
    DECILE_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_DECILE_TABLE
    SRC_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_SRC_TABLE
    PARTITION_SRC=$SRC_TABLE\_PART
    UNIQ_SRC_TABLE=$SRC_TABLE\_UNIQ
    #UNIQ_GEN_TABLE="APT_ADHOC_TMOBILE_TEST_UNIQ_GEN_TABLE_DND"
    UNIQ_GEN_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_GEN_TABLE
    PB_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_$WEEK\_POSTBACK_TABLE
    REPLACE_IP_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_REPLACE_IP_TABLE
    REPLACE_TIMESTAMP_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_REPLACE_TIMESTAMP_TABLE

    # Snowflake Final Table Structure
    SF_FINAL_TABLE="APT_CUSTOM_{client_name}_{week}_{date}_FINAL"

    #==DELIVERED TEMP TABLE CREATIONS ===#

    GREEN_DELIVERED_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_GREEN_DELIVERED_TABLE_TEMP
    GREEN_OPENS_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_GREEN_GEN_OPENS_TABLE_TEMP
    GREEN_CLICKS_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_GREEN_GEN_CLICKS_TABLE_TEMP
    GREEN_UNSUBS_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_GREEN_GEN_UNSUBS_TABLE_TEMP
    GREEN_FINAL_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_GREEN_FINAL_TABLE_TEMP

    GREEN_TOTAL_UNSUBS_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_GREEN_TOTAL_UNSUBS_TABLE_TEMP

    ARCA_GENUINE_DEL_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_ARCA_DELIVERED_TABLE_TEMP

    ORANGE_GENUNIE_DELIVERED=APT_CUSTOM_$1\_$CLIENT_NAME\_ORANGE_DELIVERED_TABLE_TEMP
    ORANGE_DEPLOY_IDS_TABLE=APT_CUSTOM_$1\_$CLIENT_NAME\_ORANGE_DEPLOY_TABLE_TEMP
    ORANGE_GENUINE_DEL_TEMP=APT_CUSTOM_$1\_$CLIENT_NAME\_ORANGE_DEL_MAIN_TABLE_TEMP
fi

