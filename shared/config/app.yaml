# Snowflake Upload Configuration
snowflake:
  # Production Delivery Configuration (Existing)
  production:
    enabled: true
    temp_dir: "/tmp/snowflake_uploads"
    file_delimiter: "|"
    compression: "gzip"
    max_file_size_mb: 500
    max_concurrent_uploads: 2  # Maximum concurrent Snowflake uploads (prevent RAM exhaustion)
    batch_size: 10000  # Number of rows to fetch per batch
    purge_temp_files: true
    # Production Snowflake Account Credentials
    connection:
      account: "zeta_hub_reader.us-east-1"
      user: "zx_dataops_service"
      private_key_path: "backend/.snowflake/rsa_key.p8"
      private_key_passphrase: "Snowfl@ke12#$"
      database: "HUBUSERS"
      schema: "ZX_DATAOPS"
      warehouse: "ZX_DATAOPS_WH"
      role: ""
    table:
      name_template: "APT_CUSTOM_{client_name}_{week}_{date}"
      schema_suffix: "_FINAL"
      sf_final_table: "APT_CUSTOM_{client_name}_{week}_{date}_FINAL"  # Complete Snowflake table name pattern
      overwrite_on_reupload: true
    columns:
      standard_header:
        - name: "Md5hash"
          type: "VARCHAR"
        - name: "Segment"
          type: "VARCHAR"
        - name: "SubSeg"
          type: "VARCHAR"
        - name: "Decile"
          type: "VARCHAR"
        - name: "DeliveredFlag"
          type: "VARCHAR"
        - name: "DeliveredDate"
          type: "DATE"
        - name: "Subject"
          type: "VARCHAR"
        - name: "Creative"
          type: "VARCHAR"
        - name: "OpenDate"
          type: "DATE"
        - name: "ClickDate"
          type: "DATE"
        - name: "UnsubDate"
          type: "DATE"
      excluded_columns:
        - "priority"
        - "status"
        - "unsub"
        - "freq"
        - "id"
        - "touch"
        - "diff"
      date_columns:
        - "del_date"
        - "open_date"
        - "click_date"
        - "unsub_date"
        - "DeliveredDate"
        - "OpenDate"
        - "ClickDate"
        - "UnsubDate"

  # Audit Delivery Configuration (LPT Account - New)
  audit:
    enabled: true
    temp_dir: "/tmp/snowflake_audit_uploads"
    file_delimiter: "|"
    compression: "gzip"
    max_file_size_mb: 10240  # 10GB max file size
    batch_size: 50000  # Larger batch size for audit
    purge_temp_files: true
    # LPT Snowflake Account Credentials
    connection:
      account: "zetaglobal.us-east-1"
      user: "green_lp_service"
      private_key_path: "backend/.snowflake/lpt_rsa_key.p8"
      private_key_passphrase: "Jsw44QTLRYYGLGBgfhXQR7webwaxArWx"
      database: "GREEN"
      schema: "INFS_LPT"
      warehouse: "GREENT_LPT2"
      role: "GREEN_ADMIN_ROLE"
    # Table Configuration
    table:
      prefix: "CUSTOM_ZX_STATS_MASTER"  # CUSTOM_ZX_STATS_MASTER_YYYY_MONTHNAME
      name_template: "{prefix}_{year}_{month}"  # e.g., CUSTOM_ZX_STATS_MASTER_2026_JANUARY
      cluster_by: "line_item_id, delivereddate, offerid, segment, delivered"
      validate_existing_data: true  # Check for existing data before insert
      remove_old_data: true  # Remove old data for same client/date range
    # Fixed Audit Header (Order Matters!)
    columns:
      fixed_header:
        - name: "Md5hash"
          source_column: "md5hash"
          type: "VARCHAR(16777216)"
        - name: "Subject"
          source_column: "subject"
          type: "VARCHAR(16777216)"
        - name: "Creative"
          source_column: "creative"
          type: "VARCHAR(16777216)"
        - name: "del_date"
          source_column: "del_date"
          alias: "delivereddate"
          type: "DATE"
        - name: "open_date"
          source_column: "open_date"
          type: "DATE"
        - name: "click_date"
          source_column: "click_date"
          type: "DATE"
        - name: "unsub_date"
          source_column: "unsub_date"
          type: "DATE"
        - name: "delivered"
          source_column: "flag"
          transform: "CASE WHEN flag IS NOT NULL THEN 'Y' ELSE flag END"
          type: "VARCHAR(16777216)"
        - name: "Segment"
          source_column: "segment"
          type: "VARCHAR(16777216)"
        - name: "D_B_Segment"
          source_column: "client_name"
          is_parameter: true  # Will be replaced with actual client name
          type: "VARCHAR(16777216)"
        - name: "FILE_NAME"
          source_column: "source_table"
          is_parameter: true  # Will be replaced with actual source table name
          type: "VARCHAR(16777216)"
      # Complete table schema for CREATE TABLE
      table_schema:
        - name: "MD5HASH"
          type: "VARCHAR(16777216)"
        - name: "DELIVEREDDATE"
          type: "DATE"
        - name: "OPEN_DATE"
          type: "DATE"
        - name: "CLICK_DATE"
          type: "DATE"
        - name: "UNSUB_DATE"
          type: "DATE"
        - name: "CREATIVE"
          type: "VARCHAR(16777216)"
        - name: "SUBJECT"
          type: "VARCHAR(16777216)"
        - name: "TABLE_NAME"
          type: "VARCHAR(16777216)"
        - name: "FILE_NAME"
          type: "VARCHAR(16777216)"
        - name: "ID"
          type: "NUMBER(38,0)"
          autoincrement: true
        - name: "LISTID"
          type: "VARCHAR(16777216)"
        - name: "PROFILEID"
          type: "VARCHAR(16777216)"
        - name: "EMAIL"
          type: "VARCHAR(16777216)"
        - name: "DEL_TS"
          type: "TIMESTAMP_NTZ(9)"
        - name: "OPEN_TS"
          type: "TIMESTAMP_NTZ(9)"
        - name: "CLICK_TS"
          type: "TIMESTAMP_NTZ(9)"
        - name: "BROWSER"
          type: "VARCHAR(16777216)"
        - name: "OFFERID"
          type: "VARCHAR(16777216)"
        - name: "DOMAIN"
          type: "VARCHAR(16777216)"
        - name: "MAILING_IP"
          type: "VARCHAR(16777216)"
        - name: "MSGID"
          type: "VARCHAR(16777216)"
        - name: "SUBID"
          type: "VARCHAR(16777216)"
        - name: "IPADDR"
          type: "VARCHAR(16777216)"
        - name: "CREATIVEID"
          type: "VARCHAR(16777216)"
        - name: "IO_ID"
          type: "NUMBER(38,0)"
        - name: "LINE_ITEM_ID"
          type: "NUMBER(38,0)"
        - name: "RC_IP"
          type: "VARCHAR(16777216)"
        - name: "PMTA_IP"
          type: "VARCHAR(16777216)"
        - name: "PMTA_FILENAME"
          type: "VARCHAR(16777216)"
        - name: "OPEN_FILENAME"
          type: "VARCHAR(16777216)"
        - name: "UNSUB_FILENAME"
          type: "VARCHAR(16777216)"
        - name: "CLICK_FILENAME"
          type: "VARCHAR(16777216)"
        - name: "UNSUB_TS"
          type: "TIMESTAMP_NTZ(9)"
        - name: "DELIVERED"
          type: "VARCHAR(16777216)"
        - name: "SEGMENT"
          type: "VARCHAR(16777216)"
        - name: "D_B_SEGMENT"
          type: "VARCHAR(16777216)"
        - name: "ADVERTISER_NAME"
          type: "VARCHAR(16777216)"
        - name: "BOUNCECAT"
          type: "VARCHAR(16777216)"
        - name: "DSNSTATUS"
          type: "VARCHAR(16777216)"
        - name: "DSNDIAG"
          type: "VARCHAR(16777216)"
        - name: "TYPE"
          type: "VARCHAR(16777216)"
    # Date Analysis Configuration
    date_analysis:
      source_column: "del_date"  # Column to analyze for month grouping
      month_names:
        1: "JANUARY"
        2: "FEBRUARY"
        3: "MARCH"
        4: "APRIL"
        5: "MAY"
        6: "JUNE"
        7: "JULY"
        8: "AUGUST"
        9: "SEPTEMBER"
        10: "OCTOBER"
        11: "NOVEMBER"
        12: "DECEMBER"
      max_years: 2  # Maximum years span (e.g., Dec 2025 + Jan 2026)
    # File Naming Convention
    file_naming:
      prefix: "AUDIT"
      format: "{prefix}_{client_name}_{year}_{month}_{timestamp}.csv"
      timestamp_format: "%Y%m%d_%H%M%S"

  # Legacy/Backward Compatibility (Deprecated - use production instead)
  upload:
    enabled: true
    temp_dir: "/tmp/snowflake_uploads"
    file_delimiter: "|"
    compression: "gzip"
    max_file_size_mb: 500
    max_concurrent_uploads: 2
    batch_size: 10000
    purge_temp_files: true
  table:
    name_template: "APT_CUSTOM_{client_name}_{week}_{date}"
    schema_suffix: "_FINAL"
    sf_final_table: "APT_CUSTOM_{client_name}_{week}_{date}_FINAL"
    overwrite_on_reupload: true
  columns:
    standard_header:
      - name: "Md5hash"
        type: "VARCHAR"
      - name: "Segment"
        type: "VARCHAR"
      - name: "SubSeg"
        type: "VARCHAR"
      - name: "Decile"
        type: "VARCHAR"
      - name: "DeliveredFlag"
        type: "VARCHAR"
      - name: "DeliveredDate"
        type: "DATE"
      - name: "Subject"
        type: "VARCHAR"
      - name: "Creative"
        type: "VARCHAR"
      - name: "OpenDate"
        type: "DATE"
      - name: "ClickDate"
        type: "DATE"
      - name: "UnsubDate"
        type: "DATE"
    excluded_columns:
      - "priority"
      - "status"
      - "unsub"
      - "freq"
      - "id"
      - "touch"
      - "diff"
    date_columns:
      - "del_date"
      - "open_date"
      - "click_date"
      - "unsub_date"
      - "DeliveredDate"
      - "OpenDate"
      - "ClickDate"
      - "UnsubDate"

