# =============================================================================
# FILE SYSTEM PATHS (Project-Oriented)
# =============================================================================
file_paths:
  # Base path - all other paths are relative to this
  # NOTE: This is the project root folder (hyphen in name is fine for shell/Python)
  base: "/u1/techteam/PFM_CUSTOM_SCRIPTS/Campaign-Attribution-Management"

  # Relative paths (use with base)
  scripts: "SCRIPTS"
  request_processing: "REQUEST_PROCESSING"
  tracking_helper: "SCRIPTS/trackingHelper.sh"

  # External paths (absolute)
  python_modules: "/u1/techteam/PFM_CUSTOM_SCRIPTS/PYTHON_MODULES"

  # Request-specific paths (use {request_id} placeholder)
  request:
    root: "REQUEST_PROCESSING/{request_id}"
    files: "REQUEST_PROCESSING/{request_id}/FILES"
    spool: "REQUEST_PROCESSING/{request_id}/SPOOL"
    scripts: "REQUEST_PROCESSING/{request_id}/SCRIPTS"
    logs: "REQUEST_PROCESSING/{request_id}/LOGS"
    backup: "REQUEST_PROCESSING/{request_id}/PURGED_DATA"
    config: "REQUEST_PROCESSING/{request_id}/ETC"

# =============================================================================
# ALERTS CONFIGURATION (Single Source of Truth for Email)
# =============================================================================
alerts:
  # Recipients for all email notifications (comma-separated)
  email_recipients: "akhan@zetaglobal.com,attributionteam@zetaglobal.com"

  # Sender address for all email notifications
  # Format: "Display Name <email@domain.com>" or just "email@domain.com"
  # Used by:
  #   - Shell scripts: mail -r "$ALERT_SENDER"
  #   - Python scripts: msg['From'] = config.alert_sender
  #   - sendmail scripts: echo "From: $ALERT_SENDER"
  sender: "CAM Alerts <cam@zetaglobal.com>"

  # Alternative sender format (simple email only):
  # sender: "cam@zetaglobal.com"

# =============================================================================
# APPLICATION CONSTANTS
# =============================================================================
constants:
  pagination:
    defaultPageSize: 50
    maxPageSize: 500

  requests:
    maxRetries: 3
    timeoutMs: 300000
    validStatuses: ["V", "C", "E", "RW", "RE"]
    defaultOldDeliveredPercentage: 65
    columns:
      requestIdSuppression: "request_id_supp"
      priorityFile: "priority_file"
      priorityFilePercentage: "priority_file_per"
      timeStampPath: "timestamp_report_path"

  files:
    maxUploadSize: 104857600  # 100MB
    allowedTypes: [".csv", ".xlsx", ".txt"]

  upload:
    max_size_mb: 50
    allowed_extensions: ["csv", "xlsx", "xls"]
    base_path: "REPORT_FILES"
    validation:
      immediate: true
      csv_delimiter: "|"
      apostrophe_conversion: true  # Convert ' to '' for PostgreSQL compatibility
      timestamp_format_strict: true  # Enforce YYYY-MM-DD and YYYY-MM-DD hh:mm:ss formats
    naming:
      format: "{type}_{client_name}_{week_name}.csv"
      types:
        timestamp: "TimeStampReport"
        cpm: "CPM_Report"
        decile: "Decile_Report"
        unique_decile: "Unique_Decile_Report"

  modules:
    1: "trt"
    2: "logs"
    3: "suppression"
    4: "source"
    5: "report"
    6: "timestamps"
    7: "ip"

  api:
    baseUrl: "http://localhost:5000"
    timeout: 30000
    retries: 3
    cors:
      allowedOrigins:
        - "http://localhost:3009"
        - "http://127.0.0.1:3009"
        - "http://localhost:3010"
        - "http://127.0.0.1:3010"
      allowedHeaders: ["Content-Type", "Accept", "Authorization"]
      allowedMethods: ["GET", "POST", "OPTIONS"]

# =============================================================================
# THEME CONFIGURATION
# =============================================================================
theme:
  colors:
    primary: "#334155"
    secondary: "#475569"
    accent: "#0F172A"
  gradients:
    client: "from-slate-50 to-gray-100"
    date: "from-amber-50 to-orange-50"
    file: "from-green-50 to-emerald-50"
    report: "from-yellow-50 to-amber-50"
    suppression: "from-violet-50 to-purple-50"
    priority: "from-blue-50 to-cyan-50"
    query: "from-rose-50 to-pink-50"
    submit: "from-slate-600 to-gray-700"
  sections:
    client: { title: "Client Information", icon: "check-circle", borderColor: "border-slate-300" }
    date: { title: "Campaign Dates", icon: "calendar", borderColor: "border-amber-300" }
    file: { title: "File Options", icon: "cog", borderColor: "border-green-300" }
    report: { title: "Report Paths", icon: "folder", borderColor: "border-yellow-300" }
    suppression: { title: "Suppression List", icon: "shield", borderColor: "border-violet-300" }
    priority: { title: "Data Priority Settings", icon: "database", borderColor: "border-blue-300" }
    query: { title: "SQL Query", icon: "code", borderColor: "border-rose-300" }

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
security:
  rateLimit:
    windowMs: 900000
    maxRequests: 100
  cors:
    credentials: true
  headers:
    contentSecurityPolicy: false
    hsts: true

# =============================================================================
# ENVIRONMENT SETTINGS
# =============================================================================
environment: "development"
debug: true

logging:
  level: "DEBUG"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# =============================================================================
# FEATURE FLAGS (Single source of truth)
# =============================================================================
features:
  file_upload_enabled: true
  hybrid_input_mode: true
  realtime_validation: true
  dual_sf_upload: false  # Default state for dual upload toggle (false=OFF, true=ON)

# =============================================================================
# REQUEST AUTOMATION (Single source of truth - removed from features)
# =============================================================================
automation:
  enabled: false  # Master switch for automation scheduler
  interval_seconds: 60  # How often to run requestPicker.sh
  script_path: "./SCRIPTS/requestPicker.sh"  # Path to requestPicker.sh (relative to project root)
  script_timeout_seconds: 300  # Timeout for script execution (5 minutes)

# =============================================================================
# PROCESSING CONFIGURATION (Python Scripts)
# =============================================================================
processing:
  # Worker pool settings
  max_workers: 5
  chunk_size: 2_000_000

  # Retry settings
  max_retries: 3
  retry_delay_seconds: 5

  # Audit client IDs (special handling for these clients)
  audit_client_ids: [180, 181, 182, 183, 184, 185, 187, 188, 189, 190]
  audit_trt_buffer: 5_000_000

# =============================================================================
# STAGING CONFIGURATION (Snowflake Data Export)
# =============================================================================
staging:
  enabled: true
  prefix: "apt_rltp_temp_stage"
  max_file_size: 500_000_000  # 500MB per file
  compression: "GZIP"

# =============================================================================
# INDEX CONFIGURATION (PostgreSQL Index Templates)
# =============================================================================
indexes:
  # Index name patterns (use .format() with request_id and decile)
  email: "idx_{request_id}_{decile}_email"
  seg_subseg: "idx_{request_id}_{decile}_seg_subseg"
  md5: "idx_{request_id}_{decile}_md5"

# =============================================================================
# SQL QUERY TEMPLATES (Python Scripts)
# =============================================================================
queries:
  # Request details query - returns all columns from both tables (except duplicate b.client_id)
  # Scripts extract only the columns they need from this comprehensive result
  # Note: a.* includes added_by (from requests table)
  request_details: |
    SELECT a.*,
           b.client_name,
           b.prev_week_pb_table,
           b.total_delivered_table,
           b.posted_unsub_hards_table,
           b.posted_bounce_table,
           b.weeklynewrltpid
    FROM {requests_table} a
    JOIN {clients_table} b ON a.client_id = b.client_id
    WHERE a.request_id = {request_id}

  # Update request status
  update_status: |
    UPDATE {requests_table}
    SET request_status = 'E',
        request_desc = '{description}',
        error_code = 1
    WHERE request_id = {request_id}

  # Update request description
  update_desc: |
    UPDATE {requests_table}
    SET request_desc = '{description}'
    WHERE request_id = {request_id}

  # Update QA stats
  update_qa_count: |
    UPDATE {qa_table}
    SET RLTP_FILE_COUNT = {count}
    WHERE request_id = {request_id}

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
frontend:
  development:
    port: 3009
    host: "localhost"
  build:
    outputDir: "dist"
    assetsDir: "assets"

backend:
  development:
    port: 5000
    host: "0.0.0.0"
  debug: true
  threading: true
  reloader: true
