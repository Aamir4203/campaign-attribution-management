        - { name: "SUBID", type: "VARCHAR(16777216)" }
        - { name: "IPADDR", type: "VARCHAR(16777216)" }
        - { name: "CREATIVEID", type: "VARCHAR(16777216)" }
        - { name: "IO_ID", type: "NUMBER(38,0)" }
        - { name: "LINE_ITEM_ID", type: "NUMBER(38,0)" }
        - { name: "RC_IP", type: "VARCHAR(16777216)" }
        - { name: "PMTA_IP", type: "VARCHAR(16777216)" }
        - { name: "PMTA_FILENAME", type: "VARCHAR(16777216)" }
        - { name: "OPEN_FILENAME", type: "VARCHAR(16777216)" }
        - { name: "UNSUB_FILENAME", type: "VARCHAR(16777216)" }
        - { name: "CLICK_FILENAME", type: "VARCHAR(16777216)" }
